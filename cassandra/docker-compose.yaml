services:
  cassandra-1:
    image: cassandra:5.0
    container_name: cassandra-1
    hostname: cassandra-1
    environment:
      CASSANDRA_CLUSTER_NAME: "OTUSCluster"
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: "cassandra-1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    ports:
      - "9042:9042"
    volumes:
      - cassandra-1-data:/var/lib/cassandra
    networks:
      - cassandra-net
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-2:
    image: cassandra:5.0
    container_name: cassandra-2
    hostname: cassandra-2
    environment:
      CASSANDRA_CLUSTER_NAME: "OTUSCluster"
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: "cassandra-1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    ports:
      - "9043:9042"
    volumes:
      - cassandra-2-data:/var/lib/cassandra
    networks:
      - cassandra-net
    depends_on:
      cassandra-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-3:
    image: cassandra:5.0
    container_name: cassandra-3
    hostname: cassandra-3
    environment:
      CASSANDRA_CLUSTER_NAME: "OTUSCluster"
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: "cassandra-1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    ports:
      - "9044:9042"
    volumes:
      - cassandra-3-data:/var/lib/cassandra
    networks:
      - cassandra-net
    depends_on:
      cassandra-2:
        condition: service_healthy

volumes:
  cassandra-1-data:
  cassandra-2-data:
  cassandra-3-data:

networks:
  cassandra-net:
    driver: bridge
