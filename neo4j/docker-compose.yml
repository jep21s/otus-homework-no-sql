version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - graph-net

  postgres:
    image: postgres:16
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: graph_comparison
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - graph-net

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:

networks:
  graph-net:
    driver: bridge
